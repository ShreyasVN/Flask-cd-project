# Inventory file for Ansible
# Ansible will connect to these nodes to install Docker and Kubernetes

[k8s_masters]
# Replace <MASTER_IP> with the actual IP address from Terraform output
master-node ansible_host=<MASTER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k8s_workers]
# Replace <WORKER_IP> with the actual IP address from Terraform output
worker-node ansible_host=<WORKER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k8s_cluster:children]
k8s_masters
k8s_workers

[all:vars]
# Common variables for all nodes
ansible_python_interpreter=/usr/bin/python3